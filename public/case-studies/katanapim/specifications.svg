<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="KatanaPIM product specifications UI placeholder">
  <rect width="1600" height="900" fill="#f5f3ee"/>

  <!-- main column -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="60" y="50" font-size="10" letter-spacing="2" fill="#888">EDIT PRODUCT DETAILS</text>
    <text x="60" y="84" font-size="28" font-weight="800" fill="#111">TEST</text>

    <rect x="60" y="110" width="40" height="36" fill="#ffffff" stroke="#d9d5cf"/>
    <text x="80" y="132" text-anchor="middle" fill="#444" font-size="14">←</text>
    <rect x="104" y="110" width="150" height="36" fill="#2563eb"/>
    <text x="179" y="132" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Save</text>

    <!-- tabs -->
    <g font-size="12" fill="#333">
      <text x="60" y="188">INFO</text>
      <text x="130" y="188" font-weight="600">SETTINGS ▾</text>
      <text x="230" y="188">PRICING ▾</text>
      <text x="310" y="188">MAPPINGS ▾</text>
      <text x="420" y="188">TRANSLATIONS</text>
    </g>

    <!-- language tabs -->
    <g font-size="12" fill="#333">
      <rect x="60" y="220" width="140" height="30" fill="#ffffff" stroke="#d9d5cf"/>
      <text x="74" y="240" fill="#2563eb" font-weight="700">🇬🇧 English (default)</text>
      <rect x="208" y="220" width="100" height="30" fill="#ffffff" stroke="#d9d5cf"/>
      <text x="220" y="240">🇳🇱 Nederlands</text>
      <rect x="316" y="220" width="80" height="30" fill="#ffffff" stroke="#d9d5cf"/>
      <text x="328" y="240">🇫🇷 French</text>
    </g>

    <!-- filters -->
    <rect x="60" y="272" width="240" height="34" fill="#ffffff" stroke="#d9d5cf"/>
    <text x="80" y="294" font-size="12" fill="#aaa">Search</text>
    <rect x="316" y="272" width="200" height="34" fill="#ffffff" stroke="#d9d5cf"/>
    <text x="336" y="294" font-size="12" fill="#444">All Categories ▾</text>
    <text x="540" y="294" font-size="12" fill="#444">□ Required</text>
    <rect x="630" y="272" width="48" height="34" fill="#f5f3ee" stroke="#d9d5cf"/>
    <text x="654" y="294" text-anchor="middle" font-size="12" font-weight="700">All</text>
    <rect x="678" y="272" width="96" height="34" fill="#ffffff" stroke="#d9d5cf"/>
    <text x="726" y="294" text-anchor="middle" font-size="12" fill="#777">Only Empty</text>
    <rect x="774" y="272" width="72" height="34" fill="#ffffff" stroke="#d9d5cf"/>
    <text x="810" y="294" text-anchor="middle" font-size="12" fill="#777">Filled</text>

    <g font-size="12" fill="#333">
      <text x="60" y="346">4 Total</text>
      <text x="130" y="346">0 Required</text>
      <text x="230" y="346">4 Optional</text>
    </g>

    <!-- Single Specifications card -->
    <rect x="60" y="366" width="1040" height="260" fill="#ffffff" stroke="#d9d5cf"/>
    <text x="80" y="392" font-size="14" font-weight="700">Single Specifications</text>
    <rect x="80" y="404" width="100" height="20" fill="#f5f3ee" stroke="#d9d5cf"/>
    <text x="130" y="419" text-anchor="middle" font-size="10" fill="#555">3 specifications</text>

    <!-- fields -->
    <text x="80" y="452" font-size="12" fill="#333">Coil voltages</text>
    <rect x="80" y="462" width="980" height="34" fill="#ffffff" stroke="#d9d5cf"/>
    <text x="96" y="484" font-size="12" fill="#111">36 VDC</text>

    <text x="80" y="520" font-size="12" fill="#333">TDMB4-U200N Options</text>
    <rect x="80" y="530" width="980" height="34" fill="#ffffff" stroke="#d9d5cf"/>
    <rect x="96" y="540" width="260" height="18" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="106" y="553" font-size="11" fill="#1d4ed8">AgSnO2 contacts, highly resistant to welding ×</text>

    <text x="80" y="588" font-size="12" fill="#333">TDMB4-U200N Keying code</text>
    <rect x="80" y="598" width="980" height="34" fill="#ffffff" stroke="#d9d5cf"/>
    <text x="96" y="620" font-size="12" fill="#111">24 VDC Standard, silver contacts</text>

    <!-- second group -->
    <rect x="60" y="650" width="1040" height="180" fill="#ffffff" stroke="#d9d5cf"/>
    <text x="80" y="678" font-size="14" font-weight="700">234234</text>
    <rect x="80" y="688" width="96" height="20" fill="#f5f3ee" stroke="#d9d5cf"/>
    <text x="128" y="703" text-anchor="middle" font-size="10" fill="#555">1 specification</text>
    <text x="80" y="740" font-size="12" fill="#333">* Gold plated contacts characteristics — Maximum switching current</text>
    <rect x="80" y="750" width="980" height="50" fill="#ffffff" stroke="#d9d5cf"/>
  </g>

  <!-- right sidebar -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="1140" y="40" width="420" height="820" fill="#ffffff" stroke="#d9d5cf"/>
    <rect x="1160" y="60" width="180" height="34" fill="#f5f3ee" stroke="#d9d5cf"/>
    <text x="1250" y="82" text-anchor="middle" font-size="12" fill="#555">Workflow</text>
    <rect x="1342" y="60" width="200" height="34" fill="#ffffff" stroke="#2563eb"/>
    <text x="1442" y="82" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="700">Quickview</text>

    <text x="1160" y="136" font-size="10" letter-spacing="2" fill="#888">CONTENT</text>
    <text x="1160" y="162" font-size="12" fill="#666">Timer relays</text>
    <text x="1160" y="188" font-size="18" font-weight="800" fill="#111">TEST</text>
    <text x="1160" y="220" font-size="12" fill="#333">English Short Descriptions EN</text>
    <rect x="1160" y="236" width="380" height="34" fill="#f5f3ee" stroke="#d9d5cf"/>
    <text x="1350" y="258" text-anchor="middle" font-size="12" fill="#555">Full Description</text>

    <g font-size="11" letter-spacing="2" fill="#888">
      <text x="1160" y="312">SPECIFICATIONS</text>
      <text x="1160" y="360">CATEGORIES</text>
      <text x="1160" y="408">SEO</text>
      <text x="1160" y="456">ATTACHMENTS</text>
    </g>
  </g>

  <text x="1580" y="880" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#aaa">Placeholder — replace with real PNG</text>
</svg>
